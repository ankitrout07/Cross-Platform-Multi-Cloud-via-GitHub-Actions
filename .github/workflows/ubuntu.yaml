name: Ubuntu-Azure-Automation

on:
  workflow_dispatch: # Allows manual trigger only

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  linux-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: OS Update Service
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y -o Dpkg::Options::="--force-confold"
          sudo apt-get autoremove -y

      - name: Sync Azure Services
        run: |
          echo "Fetching Linux VM Status from Azure Portal..."
          az vm list --query "[?osProfile.osType=='Linux'].{Name:name, Status:powerState}" -o table