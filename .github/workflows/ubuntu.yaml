name: Ubuntu-AUM-Patching

on:
  workflow_dispatch: # Manual control for high-uptime

permissions:
  id-token: write
  contents: read

jobs:
  patch-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Trigger Azure Update Manager
        run: |
          echo "Initiating Patching for Ubuntu VMs..."
          az vm install-patches \
            --resource-group <YOUR_RESOURCE_GROUP> \
            --name <YOUR_VM_NAME> \
            --maximum-duration PT4H \
            --reboot-setting IfRequired \
            --classifications-to-include-linux Security Critical