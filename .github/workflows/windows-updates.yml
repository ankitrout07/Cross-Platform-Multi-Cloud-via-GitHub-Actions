name: Windows-AUM-Patching

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Also allow manual runs

permissions:
  id-token: write
  contents: read

jobs:
  patch-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable Azure-Managed Patching
        run: |
          echo "=== Setting patch orchestration to AutomaticByPlatform ==="
          az vm update \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --set osProfile.windowsConfiguration.patchSettings.patchMode=AutomaticByPlatform \
            --set osProfile.windowsConfiguration.patchSettings.assessmentMode=AutomaticByPlatform \
            --output none
          echo "=== Patch orchestration updated ==="

      - name: Assess Windows Patches
        run: |
          echo "=== Assessing available patches ==="
          az vm assess-patches \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --output json

      - name: Update System Packages (Choco)
        continue-on-error: true
        run: |
          az vm run-command invoke \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --command-id RunPowerShellScript \
            --scripts "if (Get-Command choco -ErrorAction SilentlyContinue) { choco upgrade all -y } else { Write-Warning 'Choco not found. Skipping packages.' }"

      - name: Trigger AUM Windows
        run: |
          echo "=== Installing Windows patches ==="
          az vm install-patches \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --maximum-duration PT4H \
            --reboot-setting IfRequired \
            --classifications-to-include-win "Critical" "Security" "UpdateRollup" "FeaturePack" "ServicePack" "Definition" "Updates" \
            --output json
          echo "=== Patch installation complete ==="
