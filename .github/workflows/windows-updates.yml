name: Windows-AUM-Patching

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Also allow manual runs

permissions:
  id-token: write
  contents: read

jobs:
  patch-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Assess Windows Patches
        continue-on-error: true
        run: |
          echo "=== Assessing available patches ==="
          az vm assess-patches \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --output json

      - name: Update System Packages (Choco)
        continue-on-error: true
        run: |
          az vm run-command invoke \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --command-id RunPowerShellScript \
            --scripts "if (Get-Command choco -ErrorAction SilentlyContinue) { choco upgrade all -y } else { Write-Warning 'Choco not found. Skipping packages.' }"

      - name: Install Windows Updates via PowerShell
        run: |
          echo "=== Installing Windows updates directly via PowerShell ==="
          az vm run-command invoke \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Windows \
            --command-id RunPowerShellScript \
            --scripts "
              # Install PSWindowsUpdate module if not present
              if (-not (Get-Module -ListAvailable -Name PSWindowsUpdate)) {
                  Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
                  Install-Module -Name PSWindowsUpdate -Force -Confirm:\$false
              }
              Import-Module PSWindowsUpdate

              # List available updates
              Write-Output '=== Available Updates ==='
              \$updates = Get-WindowsUpdate -Verbose
              \$updates | Format-Table -AutoSize

              if (\$updates.Count -eq 0) {
                  Write-Output 'No pending updates found.'
              } else {
                  Write-Output \"Found \$(\$updates.Count) update(s). Installing...\"
                  # Install all available updates, auto-accept, allow reboot if needed
                  Install-WindowsUpdate -AcceptAll -AutoReboot -Verbose | Format-Table -AutoSize
                  Write-Output '=== Update installation complete ==='
              }
            " \
            --output json
          echo "=== Done ==="
