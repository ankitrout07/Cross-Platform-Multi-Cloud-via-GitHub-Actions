name: "🎯 Single-Cloud Patching Selector"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Cloud Provider'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - AWS
          - Azure
          - BOTH
      os_type:
        description: 'Select OS Type'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - Ubuntu
          - Windows
          - BOTH

permissions:
  id-token: write
  contents: read

jobs:
  # --- AWS EXECUTION BLOCK ---
  patch-aws:
    name: "AWS Execution"
    # Execute if target_env is AWS or BOTH
    if: "${{ github.event.inputs.target_env == 'AWS' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS OIDC Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Patch AWS Ubuntu
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching AWS Ubuntu nodes (OS=Ubuntu)..."
          SCRIPT_CONTENT=$(cat scripts/ubuntu/patch.sh)
          COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
          
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:OS,Values=Ubuntu" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Selector Triggered Patching for Ubuntu"

      - name: Patch AWS Windows
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching AWS Windows nodes (OS=Windows)..."
          SCRIPT_CONTENT=$(cat scripts/windows/patch.ps1)
          COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
          
          aws ssm send-command \
            --document-name "AWS-RunPowerShellScript" \
            --targets "Key=tag:OS,Values=Windows" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Selector Triggered Patching for Windows"

  # --- AZURE EXECUTION BLOCK ---
  patch-azure:
    name: "Azure Execution"
    # Execute if target_env is Azure or BOTH
    if: "${{ github.event.inputs.target_env == 'Azure' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Patch Azure Ubuntu
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching Azure Ubuntu VM..."
          az vm run-command invoke -g Cross-Platform -n Ubuntu \
            --command-id RunShellScript \
            --scripts @scripts/ubuntu/patch.sh

      - name: Patch Azure Windows
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching Azure Windows VM..."
          az vm run-command invoke -g Cross-Platform -n Windows \
            --command-id RunPowerShellScript \
            --scripts @scripts/windows/patch.ps1
