name: "Single-Cloud Patching Selector"

env:
  # AWS Configuration
  AWS_REGION: "ap-south-1"
  AWS_TAG_KEY: "OS"
  AWS_TAG_VALUE_UBUNTU: "Ubuntu"
  AWS_TAG_VALUE_WINDOWS: "Windows"
  # Azure Configuration


on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Cloud Provider'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - AWS
          - Azure
          - BOTH
      os_type:
        description: 'Select OS Type'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - Ubuntu
          - Windows
          - BOTH

permissions:
  id-token: write
  contents: read

jobs:
  # --- AWS EXECUTION BLOCK ---
  patch-aws:
    name: "AWS Execution"
    # Execute if target_env is AWS or BOTH
    if: "${{ github.event.inputs.target_env == 'AWS' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS OIDC Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Patch AWS Ubuntu (with Watcher)
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching AWS Ubuntu nodes (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU)..."
          SCRIPT_CONTENT=$(cat scripts/ubuntu/patch.sh)
          COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
          
          RESPONSE=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_UBUNTU" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Selector Triggered Patching for Ubuntu" \
            --output json)

          COMMAND_ID=$(echo $RESPONSE | jq -r '.Command.CommandId')
          REQUESTED_COUNT=$(echo $RESPONSE | jq -r '.Command.RequestedCount')
          echo "Command sent with ID: $COMMAND_ID (Requested for $REQUESTED_COUNT targets)"

          if [ "$REQUESTED_COUNT" -eq 0 ]; then
            echo "Error: No targets matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU! (RequestedCount=0)"
            exit 1
          fi

          # Polling for status
          echo "Waiting for command execution to complete..."
          while true; do
            STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
            echo "Current Status: $STATUS"
            
            if [[ "$STATUS" == "Success" ]]; then
              echo "Command completed successfully!"
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              echo "Command execution failed with status: $STATUS"
              exit 1
            fi
            
            sleep 15
          done


      - name: Patch AWS Windows (with Watcher)
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Patching AWS Windows nodes (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS)..."
          SCRIPT_CONTENT=$(cat scripts/windows/patch.ps1)
          COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
          
          RESPONSE=$(aws ssm send-command \
            --document-name "AWS-RunPowerShellScript" \
            --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_WINDOWS" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Selector Triggered Patching for Windows" \
            --output json)

          COMMAND_ID=$(echo $RESPONSE | jq -r '.Command.CommandId')
          REQUESTED_COUNT=$(echo $RESPONSE | jq -r '.Command.RequestedCount')
          echo "Command sent with ID: $COMMAND_ID (Requested for $REQUESTED_COUNT targets)"

          if [ "$REQUESTED_COUNT" -eq 0 ]; then
            echo "Error: No targets matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS! (RequestedCount=0)"
            exit 1
          fi

          # Polling for status
          echo "Waiting for command execution to complete..."
          while true; do
            STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
            echo "Current Status: $STATUS"
            
            if [[ "$STATUS" == "Success" ]]; then
              echo "Command completed successfully!"
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              echo "Command execution failed with status: $STATUS"
              exit 1
            fi
            
            sleep 15
          done


  # --- AZURE EXECUTION BLOCK ---
  patch-azure:
    name: "Azure Execution"
    # Execute if target_env is Azure or BOTH
    if: "${{ github.event.inputs.target_env == 'Azure' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Patch Azure Ubuntu (Discovery & Execution)
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding Azure Ubuntu VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU)"
          VM_LIST=$(az vm list --query "[?tags.$AWS_TAG_KEY=='$AWS_TAG_VALUE_UBUNTU'].{name:name, rg:resourceGroup}" -o json)
          VM_COUNT=$(echo "$VM_LIST" | jq '. | length')
          echo "Found $VM_COUNT matching VMs."

          if [ "$VM_COUNT" -gt 0 ]; then
            echo "Phase 2: Execution - Patching discovered fleet"
            echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
              NAME=$(echo "$vm" | jq -r '.name')
              RG=$(echo "$vm" | jq -r '.rg')
              echo "Targeting VM: $NAME in $RG..."
              az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunShellScript --scripts @scripts/ubuntu/patch.sh
            done
          else
            echo "No Ubuntu VMs found for patching."
          fi


      - name: Patch Azure Windows (Discovery & Execution)
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding Azure Windows VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS)"
          VM_LIST=$(az vm list --query "[?tags.$AWS_TAG_KEY=='$AWS_TAG_VALUE_WINDOWS'].{name:name, rg:resourceGroup}" -o json)
          VM_COUNT=$(echo "$VM_LIST" | jq '. | length')
          echo "Found $VM_COUNT matching VMs."

          if [ "$VM_COUNT" -gt 0 ]; then
            echo "Phase 2: Execution - Patching discovered fleet"
            echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
              NAME=$(echo "$vm" | jq -r '.name')
              RG=$(echo "$vm" | jq -r '.rg')
              echo "Targeting VM: $NAME in $RG..."
              az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunPowerShellScript --scripts @scripts/windows/patch.ps1
            done
          else
            echo "No Windows VMs found for patching."
          fi

