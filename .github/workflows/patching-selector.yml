name: "🎯 Single-Cloud Patching Selector"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Cloud Provider'
        required: true
        default: 'AWS'
        type: choice
        options:
          - AWS
          - Azure

permissions:
  id-token: write
  contents: read

jobs:
  # --- AWS JOB ---
  patch-aws:
    name: "Execute AWS Patching (Mumbai)"
    if: "${{ github.event.inputs.target_env == 'AWS' }}"
    runs-on: ubuntu-latest
    steps:
      - name: AWS OIDC Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Send SSM Command
        run: |
          aws ssm send-command \
            --document-name "AWS-RunPatchBaseline" \
            --targets "Key=tag:PatchGroup,Values=Production" \
            --parameters 'Operation=["Install"]' \
            --comment "Targeted AWS Patch from Selector"

  # --- AZURE JOB ---
  patch-azure:
    name: "Execute Azure Patching"
    if: "${{ github.event.inputs.target_env == 'Azure' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Trigger Azure Update Manager
        run: |
          az vm install-patches -g Cross-Platform-Update -n Ubuntu \
            --reboot-setting IfRequired --classifications-to-include-linux Critical Security
