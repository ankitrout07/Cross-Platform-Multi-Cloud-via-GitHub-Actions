name: Windows-MultiCloud-Patching

env:
  # AWS Configuration
  AWS_REGION: "ap-south-1"
  AWS_TAG_KEY: "OS"
  AWS_TAG_VALUE: "Windows"
  # Azure Configuration


on:
  push:
    branches:
      - main
    paths:
      - 'scripts/windows/**'
  workflow_dispatch: # Manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  patch-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # --- AZURE SECTION ---
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Discovery & Patching (List then Execute)
        run: |
          echo "Phase 1: Discovery - Finding all Windows VMs with Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE"
          # Fetch VMs matching the tag across the subscription
          VM_LIST=$(az vm list --query "[?tags.$AWS_TAG_KEY=='$AWS_TAG_VALUE'].{name:name, rg:resourceGroup}" -o json)
          
          VM_COUNT=$(echo "$VM_LIST" | jq '. | length')
          echo "Found $VM_COUNT matching VMs."

          if [ "$VM_COUNT" -eq 0 ]; then
            echo "Error: No Azure VMs matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE!"
            exit 1
          fi

          echo "Phase 2: Execution - Running PowerShell Script on discovered fleet"
          echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
            NAME=$(echo "$vm" | jq -r '.name')
            RG=$(echo "$vm" | jq -r '.rg')
            echo "--------------------------------------------------------"
            echo "Targeting VM: $NAME in Resource Group: $RG..."
            az vm run-command invoke -g "$RG" -n "$NAME" \
              --command-id RunPowerShellScript \
              --scripts @scripts/windows/patch.ps1
          done


      # --- AWS SECTION ---
      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}


      - name: AWS Patching (SSM Run Script with Watcher)
        run: |
          echo "Executing script on AWS Windows Fleet (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE)..."
          SCRIPT_CONTENT=$(cat scripts/windows/patch.ps1)
          # Use jq to safely format the script for SSM
          COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
          
          RESPONSE=$(aws ssm send-command \
            --document-name "AWS-RunPowerShellScript" \
            --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Universal Scripted Patching for Windows" \
            --output json)

          COMMAND_ID=$(echo $RESPONSE | jq -r '.Command.CommandId')
          REQUESTED_COUNT=$(echo $RESPONSE | jq -r '.Command.RequestedCount')
          echo "Command sent with ID: $COMMAND_ID (Requested for $REQUESTED_COUNT targets)"

          if [ "$REQUESTED_COUNT" -eq 0 ]; then
            echo "Error: No targets matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE! (RequestedCount=0)"
            exit 1
          fi

          # Polling for status
          echo "Waiting for command execution to complete..."
          while true; do
            STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
            echo "Current Status: $STATUS"
            
            if [[ "$STATUS" == "Success" ]]; then
              echo "Command completed successfully!"
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              echo "Command execution failed with status: $STATUS"
              exit 1
            fi
            
            sleep 15
          done

